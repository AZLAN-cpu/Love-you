<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Years with CHINNU</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a0033; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #lock-screen { text-align: center; background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 20px; border: 3px solid #ff00ff; width: 85%; max-width: 300px; z-index: 100; }
        input { width: 80%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; font-size: 1.5rem; text-align: center; }
        button { background: #ff00ff; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 10px; width: 100%; cursor: pointer; }
        .creator-tag { font-size: 0.8rem; color: #ffd700; margin-top: 15px; text-transform: uppercase; }
        #content { display: none; text-align: center; width: 100%; height: 100vh; overflow-y: auto; }
        .flash-text { font-size: 2.5rem; animation: rapidFlash 0.1s infinite; margin: 20px 0; font-weight: bold; }
        @keyframes rapidFlash { 0% { color: #800080; } 100% { color: #ff0000; } }
        .slides-box { width: 90%; max-width: 400px; height: 350px; margin: 20px auto; border: 3px solid white; border-radius: 15px; overflow: hidden; position: relative; }
        .mySlides { display: none; width: 100%; height: 100%; object-fit: cover; }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .popper { position: absolute; font-size: 24px; animation: fly 2.5s linear forwards; top: 110%; z-index: 1; }
        @keyframes fly { to { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: #ff00ff;">🔒 Enter Secret Code</h2>
        <input type="number" id="userPass" placeholder="251015" inputmode="numeric">
        <button onclick="checkUnlock()">UNLOCK SURPRISE</button>
        <div class="creator-tag">Creator RAM</div>
    </div>

    <div id="content">
        <div class="flash-text">I LOVE YOU</div>
        <h2 style="color: #ffd700;">10 YEARS CELEBRATION! 🥂</h2>
        <div class="slides-box">
            <img src="https://via.placeholder.com/400x500?text=Photo+1" class="mySlides">
            <img src="https://via.placeholder.com/400x500?text=Photo+2" class="mySlides">
            <img src="https://via.placeholder.com/400x500?text=Photo+3" class="mySlides">
        </div>
        <p>i love you and ummmmmmmmmmmmmmmaaaaaahh..... ❤️</p>
        <div class="creator-tag" style="margin-bottom: 50px;">Created by RAM</div>
    </div>

    <div id="kissModal" class="modal">
        <div style="text-align: center;">
            <div style="font-size: 6rem;">💋</div>
            <div class="flash-text">I LOVE YOU</div>
            <button onclick="closeKiss()" style="background:white; color:black; padding:15px 30px; border-radius:15px; font-weight:bold; border:none;">Open Memories</button>
        </div>
    </div>

    <script>
        function checkUnlock() {
            var typed = document.getElementById('userPass').value;
            // The check
            if (typed == "251015") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('kissModal').style.display = 'flex';
                startPoppers();
                startSlides();
            } else {
                alert("Incorrect Code!");
            }
        }

        function closeKiss() {
            document.getElementById('kissModal').style.display = 'none';
        }

        function startPoppers() {
            setInterval(function() {
                var p = document.createElement('div');
                p.className = 'popper';
                p.innerText = '🎉';
                p.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(p);
                setTimeout(function() { p.remove(); }, 3000);
            }, 100);
        }

        var sIndex = 0;
        function startSlides() {
            var s = document.getElementsByClassName("mySlides");
            for (var i = 0; i < s.length; i++) { s[i].style.display = "none"; }
            sIndex++;
            if (sIndex > s.length) { sIndex = 1; }
            s[sIndex-1].style.display = "block";
            setTimeout(startSlides, 3000);
        }
    </script>
</body>
</html>
