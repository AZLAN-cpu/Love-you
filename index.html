<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Years with CHINNU</title>
    <style>
        /* Modern Reset */
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; background: #1a0033; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Passcode Page - Creator RAM Mentioned */
        #lock-screen { text-align: center; background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 20px; border: 3px solid #ff00ff; width: 85%; max-width: 300px; z-index: 100; backdrop-filter: blur(10px); }
        input { width: 80%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; font-size: 1.5rem; text-align: center; }
        button { background: #ff00ff; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 10px; width: 100%; cursor: pointer; text-transform: uppercase;}
        .creator-tag { font-size: 0.8rem; color: #ffd700; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Main Secret Content */
        #content { display: none; text-align: center; width: 100%; height: 100vh; overflow-y: auto; padding-bottom: 50px; }
        
        /* Flashing 'I LOVE YOU' text */
        .flash-text { font-size: 2.5rem; animation: rapidFlash 0.1s infinite; margin: 15px 0; font-weight: bold; }
        @keyframes rapidFlash { 0% { color: #800080; } 100% { color: #ff0000; } }

        /* Funny Kissing Animation Container */
        .kiss-gif-container {
            width: 85%; max-width: 400px; margin: 10px auto;
            border-radius: 15px; overflow: hidden; border: 4px solid #ff1493;
            box-shadow: 0 5px 15px rgba(255,20,147,0.5);
        }
        .kiss-gif { width: 100%; display: block; object-fit: cover;}

        /* Zooming 'sree love chinnu' text */
        .zoom-text {
            font-size: 1.8rem;
            color: #ffd700;
            margin: 15px 0;
            animation: zoomPulse 2s ease-in-out infinite; /* Slower zoom for romance */
            font-weight: bold;
            display: inline-block;
        }
        @keyframes zoomPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Slideshow Memories */
        .slides-box { width: 85%; max-width: 400px; height: 320px; margin: 20px auto; border: 3px solid white; border-radius: 15px; overflow: hidden; position: relative; background: #000;}
        .mySlides { display: none; width: 100%; height: 100%; object-fit: cover; }
        
        /* Kiss Popup Modal */
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        
        /* Floating Infinity Love Symbols */
        .infinity-popper { position: absolute; font-size: 20px; animation: flyUp 3s linear forwards; top: 110%; z-index: 1; opacity: 1;}
        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(720deg); opacity: 0.1; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: #ff00ff; margin-top:0;">🔒 Open Secret</h2>
        <input type="number" id="userPass" placeholder="Pin: 251015" inputmode="numeric">
        <button onclick="checkUnlock()">UNLOCK SURPRISE</button>
        <div class="creator-tag">Creator RAM</div>
    </div>

    <div id="content">
        <div class="flash-text">I LOVE YOU</div>
        
        <div class="kiss-gif-container">
            <img src="https://media.giphy.com/media/l4pTfx2qLszoEOnQI/giphy.gif" class="kiss-gif" alt="Funny Kiss">
        </div>

        <div class="zoom-text">sree ❤️ chinnu</div>

        <h3 style="color: #fff; text-shadow: 2px 2px #ff1493;">10 YEARS CELEBRATION! 🥂</h3>
        
        <div class="slides-box">
            <img src="https://via.placeholder.com/400x500?text=Photo+1" class="mySlides">
            <img src="https://via.placeholder.com/400x500?text=Photo+2" class="mySlides">
            <img src="https://via.placeholder.com/400x500?text=Photo+3" class="mySlides">
        </div>

        <p style="font-size: 1.1rem; padding: 20px; background: rgba(255,20,147,0.1); border-radius:10px;">i love you and ummmmmmmmmmmmmmmaaaaaahh..... ❤️</p>
        <div class="creator-tag" style="margin-top: 30px; margin-bottom: 50px;">Created by RAM</div>
    </div>

    <div id="kissModal" class="modal">
        <div style="text-align: center; width: 85%;">
            <div style="font-size: 6rem;">💋</div>
            <div class="flash-text">I LOVE YOU</div>
            <p>ummmmmmmmmmmmmmmaaaaaahh.....</p>
            <button onclick="closeKiss()" style="background:white; color:black; padding:15px 30px; border-radius:15px; font-weight:bold; border:none; cursor:pointer;">Open memories</button>
        </div>
    </div>

    <script>
        function checkUnlock() {
            var typed = document.getElementById('userPass').value;
            // Password is 251015
            if (typed == "251015") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('kissModal').style.display = 'flex';
                
                startPoppers(); // Start floating infinity love
                startSlides();
        }
    </script>
</body>
</html>
