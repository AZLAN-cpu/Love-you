<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SREE ❤️ CHINNU</title>
    <style>
        /* Force the background to be purple and fill the screen */
        html, body {
            background: #1a0033 !important;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* This is the box that was disappearing - now forced to center */
        #login-container {
            position: relative;
            background: rgba(255, 255, 255, 0.95); /* Bright background so it is visible */
            padding: 30px 20px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
            z-index: 999;
            border: 4px solid #ff00ff;
        }

        .names { font-size: 26px; color: #ff00ff; font-weight: bold; margin-bottom: 15px; }
        input { width: 80%; padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 20px; color: black; }
        button { background: #ff00ff; color: white; border: none; padding: 15px; width: 90%; border-radius: 10px; font-weight: bold; font-size: 16px; }
        
        /* Secret Page Style */
        #secret { display: none; background: #1a0033; width: 100%; height: 100%; overflow-y: auto; text-align: center; color: white; padding-top: 40px; }
        .love-text { font-size: 35px; color: red; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
        .infinity { position: absolute; top: -50px; font-size: 25px; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="names">sree ❤️ chinnu</div>
        <p style="color: #333; margin: 0 0 15px 0;">Enter Passcode</p>
        <input type="number" id="pin" placeholder="251015" inputmode="numeric">
        <button onclick="check()">UNLOCK SURPRISE</button>
        <p style="color: #666; font-size: 11px; margin-top: 15px;">Creator RAM</p>
    </div>

    <div id="secret">
        <div class="love-text">I LOVE YOU</div>
        <img src="https://media.giphy.com/media/l4pTfx2qLszoEOnQI/giphy.gif" style="width: 80%; border-radius: 15px; margin: 20px 0;">
        <h2 style="color: #ffd700;">sree ❤️ chinnu</h2>
        <p>10 YEARS CELEBRATION! 🥂</p>
        <p>ummmmmmah! ❤️</p>
    </div>

    <script>
        function check() {
            var val = document.getElementById('pin').value;
            if (val == "251015") {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('secret').style.display = 'block';
                
                // Floating Infinity Symbols
                setInterval(function() {
                    var i = document.createElement('div');
                    i.className = 'infinity';
                    i.innerHTML = '♾️💜';
                    i.style.left = Math.random() * 90 + 'vw';
                    document.body.appendChild(i);
                    setTimeout(function() { i.remove(); }, 3000);
                }, 200);
            } else {
                alert("Wrong Code!");
            }
        }
    </script>
</body>
</html>
