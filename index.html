<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For CHINNU</title>
    <style>
        /* Base Styles */
        body { 
            margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; 
            background: #1a0033; color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* 1. OPENING WINDOW (LOCK SCREEN) */
        #lock-screen { 
            text-align: center; background: rgba(255, 255, 255, 0.1); 
            padding: 30px; border-radius: 20px; border: 3px solid #ff00ff; 
            width: 85%; max-width: 320px; z-index: 100; backdrop-filter: blur(10px); 
        }

        /* The Zooming Name on Opening Window */
        .opening-name {
            font-size: 2.2rem; color: #ffd700; margin-bottom: 20px;
            animation: zoomPulse 2s ease-in-out infinite;
            font-weight: 900; text-shadow: 2px 2px 10px #ff1493;
        }
        @keyframes zoomPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        input { width: 85%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; font-size: 1.5rem; text-align: center; }
        button { background: #ff00ff; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 10px; width: 100%; cursor: pointer; }
