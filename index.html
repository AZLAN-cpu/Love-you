        /* THE OPENING WINDOW (LOCK SCREEN) */
        #lock-screen { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid #ff00ff; 
            width: 85%; 
            max-width: 320px; 
            z-index: 100; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        /* BIG ZOOMING NAME ON OPENING WINDOW */
        .opening-name {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 20px;
            animation: superZoom 2s ease-in-out infinite;
            font-weight: 900;
            display: block;
            text-shadow: 2px 2px 10px #ff1493;
        }
        @keyframes superZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .creator-tag { font-size: 0.8rem; color: #ffd700; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
        
        /* CONTENT (INSIDE WINDOW) */
